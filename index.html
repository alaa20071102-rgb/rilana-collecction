<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الملابس - Landing Page</title>
<style>
/* ======== Reset ======== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Georgia, serif; background-color:#F5F0E6; color:#7B5E57; line-height:1.5; }
button, select, input { font-family: inherit; }

/* ======== Header ======== */
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background: #f5f0e6; position: sticky; top:0; z-index:100; }
.lang-select { padding:5px 10px; border-radius:5px; border:1px solid #7B5E57; }
.header-buttons button { margin-left:10px; padding:10px 20px; border-radius:10px; background:#7B5E57; color:#F5F0E6; border:none; transition:0.3s; }
.header-buttons button:hover { background:#5a443d; transform:scale(1.05); }

/* ======== Landing ======== */
.landing { text-align:center; padding:100px 20px; }
.landing h1 { font-size:48px; margin-bottom:20px; }
.landing p { font-size:22px; margin-bottom:30px; }
.landing .landing-buttons button { margin:10px; padding:15px 30px; font-size:18px; border-radius:15px; border:none; background:#7B5E57; color:#F5F0E6; transition:0.3s; }
.landing .landing-buttons button:hover { transform:scale(1.05); background:#5a443d; }

/* ======== Products Grid ======== */
.products { display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:20px; padding:20px; }
.product { background:#fff5ee; border-radius:15px; padding:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); transition:0.3s; }
.product img { width:100%; border-radius:10px; cursor:pointer; transition:0.3s; }
.product:hover { transform:scale(1.02); }
.product h2 { margin:10px 0; font-size:22px; }
.product .price { font-weight:bold; margin-bottom:10px; font-size:18px; }

/* ======== Details Section ======== */
.details { display:none; margin-top:10px; padding-top:10px; border-top:1px solid #ddd; }
.details label { display:block; margin:5px 0 3px; font-weight:bold; }
.details input[type="text"], .details select { padding:5px; width:100%; border-radius:5px; border:1px solid #7B5E57; margin-bottom:10px; }
.color-options { display:flex; gap:10px; margin-bottom:10px; }
.color-btn { width:30px; height:30px; border-radius:50%; border:2px solid #7B5E57; cursor:pointer; transition:0.3s; }
.color-btn:hover { transform:scale(1.1); }
.quantity { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.quantity button { padding:5px 10px; border:none; background:#7B5E57; color:#F5F0E6; border-radius:5px; transition:0.3s; }
.quantity button:hover { background:#5a443d; }
.add-cart { width:100%; background:#7B5E57; color:#F5F0E6; border:none; padding:10px; border-radius:10px; font-size:16px; transition:0.3s; }
.add-cart:hover { background:#5a443d; transform:scale(1.05); }

/* ======== Cart Sidebar ======== */
.cart-icon { position:fixed; bottom:20px; right:20px; background:#00a86b; color:#fff; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:1000; }
.cart-sidebar { position:fixed; right:-400px; top:0; width:400px; height:100%; background:#F5F0E6; box-shadow:-5px 0 15px rgba(0,0,0,0.2); transition:0.5s; padding:20px; overflow-y:auto; z-index:999; }
.cart-sidebar.active { right:0; }
.cart-sidebar h2 { margin-bottom:20px; font-size:24px; }
.cart-item { border-bottom:1px solid #ddd; padding:10px 0; }
.cart-item p { margin:3px 0; }
.total { font-weight:bold; margin-top:15px; font-size:18px; }

/* ======== Animations ======== */
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

/* ======== Responsive ======== */
@media(max-width:768px){ .cart-sidebar{width:80%;} }
</style>
</head>
<body>
<header>
  <select class="lang-select" id="language">
    <option value="ar">العربية</option>
    <option value="fr">Français</option>
    <option value="en">English</option>
  </select>
  <div class="header-buttons">
    <button id="shopBtn">Shop Now / تسوق الآن</button>
    <button onclick="window.open('https://www.instagram.com/rilana__collection?igsh=c3kycmxrczl4M3Zt','_blank')">Visit Instagram / زوروا إنستغرام</button>
  </div>
</header>

<section class="landing">
  <h1>Welcome to our Store / مرحباً بكم في متجرنا</h1>
  <p>Click below to visit our Instagram / اضغط أدناه لزيارة الإنستغرام</p>
  <div class="landing-buttons">
    <button id="landingShopBtn">Shop Now / تسوق الآن</button>
    <button onclick="window.open('https://www.instagram.com/rilana__collection?igsh=c3kycmxrczl4M3Zt','_blank')">Visit Instagram / زوروا إنستغرام</button>
  </div>
</section>

<section class="products" id="products">

<!-- ====== Yaqout Dress ====== -->
<div class="product" data-name="Yaqout Dress" data-price="3700">
  <img src="https://i.ibb.co/1GVHY6LL" alt="Yaqout Dress" class="product-img">
  <h2>Yaqout Dress</h2>
  <p class="price">3700 DZD</p>
  <div class="details">
    <label>Color / اللون / Couleur:</label>
    <div class="color-options">
      <div class="color-btn" style="background:#d3d3d3;" data-src="https://i.ibb.co/1GVHY6LL"></div>
      <div class="color-btn" style="background:#800020;" data-src="https://i.ibb.co/jkTwFDvr"></div>
      <div class="color-btn" style="background:#008000;" data-src="https://i.ibb.co/Hp75Bxhr"></div>
      <div class="color-btn" style="background:#0000ff;" data-src="https://i.ibb.co/PsPKcQRc"></div>
    </div>
    <label>Size / المقاس / Taille:</label>
    <select class="size-select">
      <option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
    </select>
    <label>Height / الطول / Taille:</label>
    <input type="text" class="height-input" placeholder="1.50 - 1.75">
    <label>Quantity / الكمية / Quantité:</label>
    <div class="quantity">
      <button class="minus">-</button>
      <input type="text" value="1" class="qty" style="width:40px;text-align:center;">
      <button class="plus">+</button>
    </div>
    <label>Name / الاسم / Nom:</label>
    <input type="text" class="fullname">
    <label>Phone / رقم الهاتف / Téléphone:</label>
    <input type="text" class="phone">
    <label>Wilaya / الولاية / Wilaya:</label>
    <select class="wilaya-select">
      <option value="">Select / اختر / Sélectionner</option>
      <option value="Adrar">أدرار</option>
      <option value="Chlef">الشلف</option>
      <option value="Laghouat">الأغواط</option>
      <option value="Oum El Bouaghi">أم البواقي</option>
      <option value="Batna">باتنة</option>
      <option value="Béjaïa">بجاية</option>
      <option value="Biskra">بسكرة</option>
      <option value="Béchar">بشار</option>
      <option value="Blida">البليدة</option>
      <option value="Bouira">البويرة</option>
      <!-- أضف باقي الولايات حسب القائمة التي أرسلتها -->
    </select>
    <button class="add-cart">Add to Cart / أضف إلى السلة / Ajouter au panier</button>
  </div>
</div>

<!-- ====== يمكنك تكرار هذا الهيكل لبقية المنتجات الأربعة مع الصور المناسبة لكل لون ====== -->

</section>

<div class="cart-icon" id="cartIcon">🛒</div>
<div class="cart-sidebar" id="cartSidebar">
  <h2>Shopping Cart / سلة المشتريات / Panier</h2>
  <div id="cartItems"></div>
  <p class="total" id="cartTotal">Total Price / السعر الإجمالي / Prix total: 0 DZD</p>
</div>

<script>
const products = document.querySelectorAll('.product');
const cartIcon = document.getElementById('cartIcon');
const cartSidebar = document.getElementById('cartSidebar');
const cartItemsContainer = document.getElementById('cartItems');
const cartTotal = document.getElementById('cartTotal');
let cart = [];

// Delivery prices (أدرج جميع الولايات التي أرسلتها)
const deliveryPrices = {
  "Adrar":1100,"Chlef":700,"Laghouat":900,"Oum El Bouaghi":800,"Batna":900,"Béjaïa":600,
  "Biskra":900,"Béchar":1300,"Blida":500,"Bouira":600
};
// Toggle details
products.forEach(p=>{
  const img = p.querySelector('.product-img');
  const details = p.querySelector('.details');
  img.addEventListener('click',()=>{ details.style.display = details.style.display==='block'?'none':'block'; });

  // Quantity buttons
  const minus = details.querySelector('.minus');
  const plus = details.querySelector('.plus');
  const qtyInput = details.querySelector('.qty');
  minus.addEventListener('click',()=>{ if(parseInt(qtyInput.value)>1) qtyInput.value=parseInt(qtyInput.value)-1; });
  plus.addEventListener('click',()=>{ if(parseInt(qtyInput.value)<10) qtyInput.value=parseInt(qtyInput.value)+1; });

  // Color buttons
  const colorBtns = details.querySelectorAll('.color-btn');
  colorBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      img.src = btn.dataset.src;
    });
  });

  // Add to cart
  const addBtn = details.querySelector('.add-cart');
  addBtn.addEventListener('click',()=>{
    const name = p.dataset.name;
    const price = parseInt(p.dataset.price);
    const color = details.querySelector('.color-btn')?.dataset.src || 'default';
    const size = details.querySelector('.size-select').value;
    const height = details.querySelector('.height-input').value;
    const quantity = parseInt(details.querySelector('.qty').value);
    const fullname = details.querySelector('.fullname').value;
    const phone = details.querySelector('.phone').value;
    const wilaya = details.querySelector('.wilaya-select').value;
    const delivery = deliveryPrices[wilaya] || 0;
    cart.push({name, price, color, size, height, quantity, fullname, phone, wilaya, delivery});
    updateCart();
  });
});

// Update cart
function updateCart(){
  cartItemsContainer.innerHTML='';
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.quantity;
    const div=document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML=<p><strong>${item.name}</strong></p>
      <p>Color: ${item.color}</p>
      <p>Size: ${item.size}</p>
      <p>Height: ${item.height}</p>
      <p>Quantity: ${item.quantity}</p>
      <p>Price: ${item.price} DZD</p>;
    cartItemsContainer.appendChild(div);
  });
  const deliveryPrice = cart[0]?.delivery || 0;
  cartTotal.textContent=Total Price / السعر الإجمالي / Prix total: ${total+deliveryPrice} DZD (Delivery: ${deliveryPrice} DZD);
}

// Toggle cart sidebar
cartIcon.addEventListener('click',()=>{ cartSidebar.classList.toggle('active'); });

// Scroll to products on landing button
document.getElementById('shopBtn').addEventListener('click',()=>{ document.getElementById('products').scrollIntoView({behavior:'smooth'}); });
document.getElementById('landingShopBtn').addEventListener('click',()=>{ document.getElementById('products').scrollIntoView({behavior:'smooth'}); });
</script>
</body>
</html>
