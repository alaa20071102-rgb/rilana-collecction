<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rilana Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #7B5E57; --bg: #F5F0E6; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--main); }
        header { text-align: center; padding: 40px 20px; background: #fff; border-bottom: 2px solid var(--main); }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
        .product { background: #fff; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        /* جعل الصورة واضحة وكبيرة */
        .product img { width: 100%; height: auto; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .product img:hover { transform: scale(1.02); }
        .price { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: #A67C52; }
        .colors { margin: 10px 0; }
        .colors span { display: inline-block; width: 25px; height: 25px; border-radius: 50%; margin: 5px; cursor: pointer; border: 2px solid #ddd; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: var(--main); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* السلة */
        .cart-toggle { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 100; }
        .cart-panel { position: fixed; top: 0; left: -100%; width: 320px; height: 100%; background: #fff; z-index: 200; transition: 0.4s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        .cart-panel.active { left: 0; }
    </style>
</head>
<body>

<header>
    <h1>Rilana Collection</h1>
    <p>أزياء راقية لكل المناسبات</p>
</header>

<div class="products" id="productList"></div>

<div class="cart-toggle" onclick="toggleCart()">🛍️</div>

<div class="cart-panel" id="cartPanel">
    <button onclick="toggleCart()" style="color:red; background:none; border:none; cursor:pointer;">إغلاق X</button>
    <h3>طلباتك</h3>
    <div id="cartItems"></div>
    <hr>
    <p id="totalPrice" style="font-weight:bold;"></p>
    
    <label>اختر الولاية:</label>
    <select id="wilaya">
        <option value="450">بومرداس (450 دج)</option>
        <option value="500">الجزائر (500 دج)</option>
        <option value="600">البويرة / تيزي وزو (600 دج)</option>
        <option value="700">سطيف / وهران / قسنطينة (700 دج)</option>
        <option value="900">باتنة / بسكرة (900 دج)</option>
    </select>
    
    <button class="btn" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div>

<script>
const products = [
    { name: "Yaqout Dress", price: 3700, colors: [
        { name: "خمار مارون", hex: "#800020", img: "https://i.ibb.co/jkTwFDvr/8243.jpg" },
        { name: "أخضر", hex: "green", img: "https://i.ibb.co/Hp75Bxhr/8244.jpg" },
        { name: "أزرق", hex: "blue", img: "https://i.ibb.co/PsPKcQRc/8245.jpg" }
    ]},
    { name: "Sultana Dress", price: 4000, colors: [
        { name: "أبيض", hex: "#fff", img: "https://i.ibb.co/XZnkpywh/8247.jpg" }
    ]},
    { name: "Comfort Fit", price: 3900, colors: [
        { name: "بني", hex: "brown", img: "https://i.ibb.co/BFd2hbr/8241.jpg" },
        { name: "أسود", hex: "black", img: "https://i.ibb.co/8g09tL7t/8242.jpg" }
    ]},
    { name: "Aurora Top", price: 3100, colors: [
        { name: "مارون", hex: "#800020", img: "https://i.ibb.co/RGgq1GTS/8246.jpg" },
        { name: "أبيض", hex: "#fff", img: "https://i.ibb.co/cc1Mnbzw/8248.jpg" }
    ]},
    { name: "Bella Top", price: 3000, colors: [
        { name: "بيج", hex: "#F5F5DC", img: "https://i.ibb.co/Xk5K3zm7/8249.jpg" },
        { name: "أسود", hex: "black", img: "https://i.ibb.co/NG8YF6Z/8250.jpg" }
    ]}
];

let cart = [];
let selectedVariants = {};

function init() {
    let html = "";
    products.forEach((p, i) => {
        selectedVariants[i] = p.colors[0];
        html += `
        <div class="product">
            <img id="img${i}" src="${p.colors[0].img}" onclick="window.open(this.src)">
            <h3>${p.name}</h3>
            <div class="price">${p.price} DA</div>
            <div class="colors">
                ${p.colors.map(c => `<span style="background:${c.hex}" onclick="updateVariant(${i}, '${c.img}', '${c.name}')"></span>`).join("")}
            </div>
            <select id="size${i}"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
            <input type="text" id="h${i}" placeholder="الطول (مثال 1.60)">
            <button class="btn" onclick="addToCart(${i})">إضافة للسلة</button>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html;
}

function updateVariant(i, img, name) {
    document.getElementById("img" + i).src = img;
    selectedVariants[i] = { name: name, img: img };
}

function addToCart(i) {
    let size = document.getElementById("size" + i).value;
    let height = document.getElementById("h" + i).value;
    if(!height) return alert("يرجى كتابة الطول");
    
    cart.push({ ...products[i], color: selectedVariants[i].name, size, height });
    alert("تمت الإضافة!");
    renderCart();
}

function renderCart() {
    let html = ""; let total = 0;
    cart.forEach(item => {
        total += item.price;
        html += `<p style="font-size:0.9rem;">- ${item.name} (${item.color}) / ${item.size} / ${item.height}m</p>`;
    });
    document.getElementById("cartItems").innerHTML = html;
    document.getElementById("totalPrice").innerText = "المجموع: " + total + " DA";
}

function toggleCart() { document.getElementById("cartPanel").classList.toggle("active"); }

function sendOrder() {
    if(cart.length === 0) return alert("السلة فارغة");
    let delivery = parseInt(document.getElementById("wilaya").value);
    let total = 0;
    let text = "طلب جديد من Rilana Store:%0A%0A";
    cart.forEach(item => {
        total += item.price;
        text += `• ${item.name} (${item.color})%0A  المقاس: ${item.size} | الطول: ${item.height}%0A%0A`;
    });
    text += `الإجمالي مع التوصيل: ${total + delivery} DA`;
    window.open(`https://wa.me/213794042520?text=${text}`);
}

init();
</script>
</body>
</html>
