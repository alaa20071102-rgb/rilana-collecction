<!DOCTYPE html>

<meta charset="UTF-8">

<title>Store Landing Page</title>
<style>
  /* ===================== Reset & Global ===================== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Georgia, serif; background-color: #F5F0E6; color: #7B5E57; overflow-x: hidden; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; }

  /* ===================== Header ===================== */
  header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
  .lang-select { font-size: 16px; padding: 5px; border-radius: 5px; border: 1px solid #7B5E57; }
  .buttons-header button { margin-left: 10px; padding: 10px 20px; border-radius: 10px; background: #7B5E57; color: #F5F0E6; border: none; transition: 0.3s; }
  .buttons-header button:hover { background: #5a443d; transform: scale(1.05); }

  /* ===================== Products List ===================== */
  .products { display: flex; flex-direction: column; gap: 40px; padding: 20px; }
  .product { background: #fff5ee; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
  .product img { width: 100%; border-radius: 10px; cursor: pointer; transition: 0.3s; }
  .product img:hover { transform: scale(1.02); }
  .product-info { margin-top: 10px; }
  .product-info h2 { font-size: 24px; margin-bottom: 5px; }
  .product-info .price { font-weight: bold; font-size: 20px; margin-bottom: 10px; }

  /* ===================== Expanded Details ===================== */
  .details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; animation: fadeIn 0.5s; }
  .details label { display: block; margin: 8px 0 4px; font-weight: bold; }
  .details input[type="text"], .details select { padding: 5px; width: 100%; border-radius: 5px; border: 1px solid #7B5E57; }
  .color-options { display: flex; gap: 10px; margin-bottom: 10px; }
  .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #7B5E57; cursor: pointer; transition: 0.3s; }
  .color-btn:hover { transform: scale(1.1); }

  .quantity { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .quantity button { padding: 5px 10px; border: none; background: #7B5E57; color: #F5F0E6; border-radius: 5px; transition: 0.3s; }
  .quantity button:hover { background: #5a443d; }

  .add-cart { background: #7B5E57; color: #F5F0E6; border: none; padding: 10px 20px; border-radius: 10px; transition: 0.3s; }
  .add-cart:hover { background: #5a443d; transform: scale(1.05); }

  /* ===================== Cart Sidebar ===================== */
  .cart-icon { position: fixed; bottom: 20px; right: 20px; background: #00a86b; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
  .cart-sidebar { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: #F5F0E6; box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.5s; padding: 20px; overflow-y: auto; z-index: 999; }
  .cart-sidebar.active { right: 0; }
  .cart-sidebar h2 { margin-bottom: 20px; font-size: 24px; }
  .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
  .cart-item p { margin: 3px 0; }
  .total { font-weight: bold; margin-top: 15px; font-size: 18px; }

  /* ===================== Animations ===================== */
  @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

  /* ===================== Responsive ===================== */
  @media(max-width: 768px){
    .cart-sidebar { width: 80%; }
  }
</style>
</head>
